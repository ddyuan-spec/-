<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>售后中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; 
            background: #f5f5f5; 
            font-size: 14px; 
            color: #333;
        }
        
        /* 移动端容器 */
        .mobile-container {
            max-width: 414px;
            margin: 0 auto;
            background: #f5f5f5;
            min-height: 100vh;
            position: relative;
        }
        
        /* 顶部导航栏 */
        .header {
            height: 44px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 1px solid #f0f0f0;
        }
        .header-back {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-back::before {
            content: '';
            width: 10px;
            height: 10px;
            border-left: 2px solid #333;
            border-bottom: 2px solid #333;
            transform: rotate(45deg);
        }
        .header-title {
            font-size: 17px;
            font-weight: 500;
            color: #333;
        }
        
        /* Tab栏 */
        .tab-bar {
            background: #fff;
            display: flex;
            border-bottom: 1px solid #f0f0f0;
        }
        .tab-item {
            flex: 1;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #666;
            position: relative;
        }
        .tab-item.active {
            color: #333;
            font-weight: 500;
        }
        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 3px;
            background: #52c41a;
            border-radius: 2px;
        }
        
        /* 售后单卡片列表 */
        .card-list {
            padding: 12px;
        }
        
        /* 卡片样式 */
        .aftersales-card {
            background: #fff;
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #f5f5f5;
        }
        .order-no {
            font-size: 13px;
            color: #666;
        }
        .order-status {
            font-size: 13px;
            color: #52c41a;
        }
        .card-body {
            padding: 12px 16px;
            display: flex;
            gap: 12px;
        }
        .product-img {
            width: 80px;
            height: 80px;
            border-radius: 4px;
            overflow: hidden;
            flex-shrink: 0;
            background: #f5f5f5;
        }
        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .product-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .product-name {
            font-size: 14px;
            color: #333;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .product-meta {
            margin-top: 8px;
        }
        .meta-row {
            display: flex;
            align-items: center;
            font-size: 13px;
            color: #666;
            margin-bottom: 4px;
        }
        .meta-label {
            color: #999;
            margin-right: 4px;
        }
        .meta-value {
            color: #333;
        }
        .refund-amount {
            color: #ff4d4f;
            font-weight: 500;
        }
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 12px 16px;
            gap: 12px;
            border-top: 1px solid #f5f5f5;
        }
        .btn {
            padding: 6px 16px;
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
            border: none;
            background: none;
        }
        .btn-outline {
            border: 1px solid #ddd;
            color: #666;
            background: #fff;
        }
        .btn-primary-outline {
            border: 1px solid #52c41a;
            color: #52c41a;
            background: #fff;
        }
        
        /* vConsole按钮 */
        .vconsole-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: #52c41a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
            box-shadow: 0 2px 8px rgba(82, 196, 26, 0.4);
            cursor: pointer;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <!-- 顶部导航栏 -->
        <div class="header">
            <div class="header-back"></div>
            <div class="header-title">售后中心</div>
        </div>
        
        <!-- Tab栏 -->
        <div class="tab-bar">
            <div class="tab-item">售后申请</div>
            <div class="tab-item active">处理中</div>
            <div class="tab-item">历史售后</div>
        </div>
        
        <!-- 售后单卡片列表 -->
        <div class="card-list">
            <!-- 卡片1 -->

                                <span class="meta-value refund-amount">¥399.00</span>

                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <button class="btn btn-outline">查看详情</button>
                </div>
            </div>
            
            <!-- 卡片2 -->
            <div class="aftersales-card">
                <div class="card-header">
                    <span class="order-no">售后单号 SS203593226353991270...</span>
                    <span class="order-status">退货中</span>
                </div>
                <div class="card-body">
                    <div class="product-img">
                        <img src="https://via.placeholder.com/80/4a90d9/fff?text=商品" alt="商品图">
                    </div>
                    <div class="product-info">
                        <div class="product-name">泰吉眠沙棘茶氨酸压片糖果 待售</div>
                        <div class="product-meta">
                            <div class="meta-row">
                                <span class="meta-label">售后类型：</span>
                                <span class="meta-value">退货退款</span>
                            </div>
                            <div class="meta-row">
                                <span class="meta-label">退款金额：</span>
                                <span class="meta-value refund-amount">¥399.00</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <button class="btn btn-outline">查看详情</button>
                </div>
            </div>
            
            <!-- 卡片3 -->
            <div class="aftersales-card">
                <div class="card-header">
                    <span class="order-no">售后单号 SS205883371993136742...</span>
                    <span class="order-status">待退货</span>
                </div>
                <div class="card-body">
                    <div class="product-img">
                        <img src="https://via.placeholder.com/80/e8a87c/fff?text=商品" alt="商品图">
                    </div>
                    <div class="product-info">
                        <div class="product-name">SALT自制卡通耳机kitty上衣女2025...</div>
                        <div class="product-meta">
                            <div class="meta-row">
                                <span class="meta-label">售后类型：</span>
                                <span class="meta-value">退货退款</span>
                            </div>
                            <div class="meta-row">
                                <span class="meta-label">退款金额：</span>
                                <span class="meta-value refund-amount">¥99.00</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <button class="btn btn-outline">查看详情</button>
                    <button class="btn btn-primary-outline">填写物流</button>
                </div>
            </div>
        </div>
        
        <!-- vConsole按钮 -->
        <div class="vconsole-btn">vConsole</div>
    </div>
</body>
</html>
