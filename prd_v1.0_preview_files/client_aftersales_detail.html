<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>退货退款详情</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: #f5f5f5;
            max-width: 414px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            padding-bottom: 60px;
        }

        /* 顶部导航栏 */
        .navbar {
            background-color: #fff;
            height: 44px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            position: relative;
            border-bottom: 1px solid #f0f0f0;
        }

        .back-btn {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            left: 15px;
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
            fill: #333;
        }

        .navbar-title {
            flex: 1;
            text-align: center;
            font-size: 17px;
            font-weight: 500;
            color: #333;
        }

        /* 状态卡片 */
        .status-card {
            background: linear-gradient(135deg, #ff9800 0%, #ff5722 100%);
            padding: 20px 15px;
            color: #fff;
        }

        .status-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .status-subtitle {
            font-size: 13px;
            opacity: 0.95;
            line-height: 1.5;
        }

        /* 地址信息 */
        .address-section {
            background-color: #fff;
            padding: 15px;
            margin-top: 10px;
        }

        .address-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .address-item:last-child {
            margin-bottom: 0;
        }

        .address-label {
            color: #999;
            font-size: 14px;
            min-width: 70px;
        }

        .address-value {
            color: #333;
            font-size: 14px;
            flex: 1;
            line-height: 1.5;
        }

        /* 退款金额 */
        .refund-amount-section {
            background-color: #fff;
            padding: 15px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .refund-amount-label {
            font-size: 14px;
            color: #333;
        }

        .refund-amount-value {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        /* 协商历史 */
        .negotiation-section {
            background-color: #fff;
            padding: 15px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .negotiation-label {
            font-size: 14px;
            color: #333;
        }

        .negotiation-arrow {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .negotiation-arrow svg {
            width: 14px;
            height: 14px;
            fill: #999;
        }

        /* 退款信息区域 */
        .refund-info-section {
            background-color: #fff;
            margin-top: 10px;
            padding: 15px;
        }

        .product-info {
            display: flex;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        .product-image {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #4a90d9 0%, #2b6cb0 100%);
            border-radius: 4px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-image::after {
            content: '';
            width: 40px;
            height: 50px;
            background-color: rgba(255,255,255,0.3);
            border-radius: 2px;
        }

        .product-detail {
            flex: 1;
            margin-left: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-name {
            font-size: 14px;
            color: #333;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .product-price {
            font-size: 16px;
            color: #ff4d4f;
            font-weight: 600;
        }

        .product-quantity {
            font-size: 13px;
            color: #999;
        }

        /* 退款详情 */
        .refund-detail {
            padding-top: 15px;
        }

        .refund-detail-item {
            display: flex;
            margin-bottom: 12px;
        }

        .refund-detail-item:last-child {
            margin-bottom: 0;
        }

        .refund-detail-label {
            color: #999;
            font-size: 14px;
            min-width: 80px;
        }

        .refund-detail-value {
            color: #333;
            font-size: 14px;
            flex: 1;
        }

        /* 底部按钮 */
        .bottom-actions {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 414px;
            background-color: #fff;
            padding: 10px 15px;
            display: flex;
            gap: 10px;
            box-shadow: 0 -1px 5px rgba(0,0,0,0.05);
        }

        .btn {
            flex: 1;
            height: 40px;
            border-radius: 20px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-vconsole {
            background-color: #52c41a;
            color: #fff;
        }

        .btn-home {
            background-color: #ff4d4f;
            color: #fff;
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <div class="navbar">
        <div class="back-btn">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
            </svg>
        </div>
        <div class="navbar-title">退货退款详情</div>
    </div>

    <!-- 状态卡片 -->
    <div class="status-card">
        <div class="status-title">请等待商家收货并退款</div>
        <div class="status-subtitle">如果商家收到货并验货无误，将操作退款给您</div>
    </div>

    <!-- 地址信息 -->
    <div class="address-section">
        <div class="address-item">
            <span class="address-label">退货地址：</span>
            <span class="address-value">1830000111 1830000110</span>
        </div>
        <div class="address-item">
            <span class="address-label"></span>
            <span class="address-value">广东省 佛山市 三水区 十六点就发了</span>
        </div>
    </div>

    <!-- 退款金额 -->
    <div class="refund-amount-section">
        <span class="refund-amount-label">申请退款金额</span>
        <span class="refund-amount-value">¥ 399</span>
    </div>

    <!-- 协商历史 -->
    <div class="negotiation-section">
        <span class="negotiation-label">协商历史</span>
        <div class="negotiation-arrow">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z"/>
            </svg>
        </div>
    </div>

    <!-- 退款信息区域 -->
    <div class="refund-info-section">
        <div class="product-info">
            <div class="product-image"></div>
            <div class="product-detail">
                <div class="product-name">泰吉眠沙棘茶氨酸压片糖果 待售</div>
                <div class="product-price-row">
                    <span class="product-price">¥399</span>
                    <span class="product-quantity">*1</span>
                </div>
            </div>
        </div>
        <div class="refund-detail">
            <div class="refund-detail-item">
                <span class="refund-detail-label">退款说明：</span>
                <span class="refund-detail-value"></span>
            </div>
            <div class="refund-detail-item">
                <span class="refund-detail-label">退款金额：</span>
                <span class="refund-detail-value">¥ 399</span>
            </div>
            <div class="refund-detail-item">
                <span class="refund-detail-label">申请时间：</span>
                <span class="refund-detail-value">2026-03-24 17:29:43</span>
            </div>
        </div>
    </div>

    <!-- 底部按钮 -->
    <div class="bottom-actions">
        <button class="btn btn-vconsole">vConsole</button>
        <button class="btn btn-home">返回首页</button>
    </div>
</body>
</html>
