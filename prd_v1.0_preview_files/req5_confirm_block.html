<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>需求5原型 - 确认收货拦截</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .phone-frame {
            width: 375px;
            height: 812px;
            background: #fff;
            margin: 0 auto;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            overflow: hidden;
            position: relative;
        }
        .status-bar {
            height: 44px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            font-size: 14px;
            font-weight: 600;
        }
        .nav-bar {
            height: 44px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 1px solid #eee;
        }
        .nav-title { font-size: 17px; font-weight: 600; }
        .back-btn {
            position: absolute;
            left: 15px;
            font-size: 24px;
            color: #333;
        }
        .content {
            height: calc(100% - 88px);
            overflow-y: auto;
            padding: 15px;
        }
        .order-card {
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 13px;
            color: #999;
        }
        .order-status {
            color: #ff6b6b;
            font-weight: 500;
        }
        .product-item {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        .product-img {
            width: 80px;
            height: 80px;
            background: #f5f5f5;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #999;
        }
        .product-info { flex: 1; }
        .product-name {
            font-size: 14px;
            color: #333;
            line-height: 1.4;
            margin-bottom: 8px;
        }
        .product-price {
            font-size: 14px;
            color: #333;
            font-weight: 600;
        }
        .action-bar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #f5f5f5;
        }
        .btn {
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            border: none;
        }
        .btn-primary {
            background: #ff6b6b;
            color: #fff;
        }
        .btn-disabled {
            background: #f5f5f5;
            color: #999;
            cursor: not-allowed;
        }
        .warning-box {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            border-radius: 8px;
            padding: 12px 15px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .warning-icon {
            width: 20px;
            height: 20px;
            background: #ff4d4f;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
        }
        .warning-text {
            flex: 1;
            font-size: 13px;
            color: #666;
        }
        .aftersales-card {
            background: #f6ffed;
            border: 1px solid #b7eb8f;
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 15px;
        }
        .aftersales-title {
            font-size: 14px;
            font-weight: 600;
            color: #52c41a;
            margin-bottom: 8px;
        }
        .aftersales-info {
            font-size: 13px;
            color: #666;
            margin: 4px 0;
        }
        .aftersales-btn {
            background: #52c41a;
            color: #fff;
            border: none;
            padding: 6px 16px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            margin-top: 8px;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #fff;
            border-radius: 16px;
            width: 300px;
            padding: 24px;
            text-align: center;
        }
        .modal-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .modal-content {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .modal-btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            background: #ff6b6b;
            color: #fff;
        }
        .prototype-title {
            text-align: center;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="prototype-title">需求5原型 - 确认收货拦截</div>
    
    <div class="phone-frame">
        <div class="status-bar">
            <span>9:41</span>
            <span>订单详情</span>
            <span>100%</span>
        </div>
        <div class="nav-bar">
            <span class="back-btn">‹</span>
            <span class="nav-title">订单详情</span>
        </div>
        <div class="content">
            <div class="order-card">
                <div class="order-header">
                    <span>订单号：202405110001</span>
                    <span class="order-status">待收货</span>
                </div>
                <div class="product-item">
                    <div class="product-img">商品图</div>
                    <div class="product-info">
                        <div class="product-name">智能蓝牙耳机 无线降噪 超长续航</div>
                        <div class="product-price">¥299.00</div>
                    </div>
                </div>
                <div class="product-item">
                    <div class="product-img">商品图</div>
                    <div class="product-info">
                        <div class="product-name">便携式充电宝 20000mAh</div>
                        <div class="product-price">¥129.00</div>
                    </div>
                </div>
            </div>
            
            <div class="aftersales-card">
                <div class="aftersales-title">⚠️ 您有正在进行的售后申请</div>
                <div class="aftersales-info">售后单号：SH202405110001</div>
                <div class="aftersales-info">售后类型：仅退款</div>
                <div class="aftersales-info">当前状态：待商家审核</div>
                <button class="aftersales-btn" onclick="goToAftersales()">查看售后详情</button>
            </div>
            
            <div class="warning-box">
                <div class="warning-icon">!</div>
                <div class="warning-text">您有正在进行的售后申请，需先处理售后才能确认收货</div>
            </div>
            
            <div class="action-bar">
                <button class="btn btn-outline" style="background:#fff;border:1px solid #ddd;color:#666;">查看物流</button>
                <button class="btn btn-disabled" onclick="showModal()">确认收货</button>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-title">无法确认收货</div>
            <div class="modal-content">您有正在进行的售后申请，需先处理售后才能确认收货。请先处理售后或联系客服。</div>
            <button class="modal-btn" onclick="hideModal()">我知道了</button>
        </div>
    </div>
    
    <script>
        function showModal() {
            document.getElementById('modal').classList.add('show');
        }
        function hideModal() {
            document.getElementById('modal').classList.remove('show');
        }
        function goToAftersales() {
            alert('跳转到售后详情页');
        }
    </script>
</body>
</html>
